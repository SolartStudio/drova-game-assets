<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Игра банщика</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;}
html,body{width:100%;height:100%;min-height:100%;margin:0;overflow:hidden;}
body{background:#120700;display:flex;align-items:center;justify-content:center;padding:0;font-family:monospace;overflow:hidden;}

.phone{transform-origin:center center;}

@media (max-width:1024px){
  .phone{position:absolute;left:50%;top:50%;}
}

@media (orientation:portrait){
  .phone{
    transform:translate(-50%,-50%) rotate(90deg) scale(0.62);
  }
}

@media (orientation:landscape){
  .phone{
    transform:translate(-50%,-50%) scale(min(100vw/960,100vh/642));
  }
}
button{font:inherit;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
.phone{width:960px;flex:0 0 960px;margin:0 auto;background:#1a0800;border:5px solid #0e0500;border-radius:14px;overflow:hidden;font-family:monospace;box-shadow:inset 0 0 0 2px #4a2008;}
.scene{width:100%;height:560px;position:relative;overflow:hidden;}

/* ── SCENE LAYERS ── */
.layer{position:absolute;pointer-events:none;display:block;image-rendering:pixelated;}
#layerNature{z-index:1;left:0;top:0;width:100%;height:100%;object-fit:cover;}
#layerSauna {z-index:2;left:0;top:0;width:100%;height:100%;object-fit:cover;}
#layerStove {z-index:3;width:936px;height:auto;right:-265px;bottom:-12px;}
#layerMikael{z-index:4;width:466px;height:auto;right:243px;bottom:-147px;}
#layerBench {z-index:5;width:877px;height:auto;left:-66px;bottom:-264px;}
#layerGuest {z-index:6;width:708px;height:auto;left:63px;bottom:-106px;}

/* ── MIKAEL SWING — видна даже когда src не меняется (правая рука = idle) ── */
@keyframes mikaelSwing{0%{filter:brightness(1)}35%{filter:brightness(1.8)}100%{filter:brightness(1)}}
#layerMikael.swing{animation:mikaelSwing .4s ease-out;}

/* ── HUD ── */
.temp-disp{position:absolute;top:85px;right:142px;z-index:8;background:rgba(15,5,0,.72);border:2px solid #8b4a10;padding:5px 12px 4px;border-radius:2px;text-align:center;}
.temp-val{font-size:38px;font-weight:bold;color:#f0d060;text-shadow:3px 3px 0 #3a1a00;display:block;transition:color .4s;}
.temp-val.hot{color:#ff4040;}.temp-val.cold{color:#60aaff;}.temp-val.ok{color:#50e040;}
.temp-range{font-size:10px;color:#b89060;letter-spacing:.5px;}
.timer-disp{position:absolute;top:26px;left:34px;z-index:8;background:rgba(15,5,0,.88);border:3px solid #8b4a10;padding:7px 14px;border-radius:2px;}
.timer-val{font-size:24px;font-weight:bold;color:#ffd060;text-shadow:2px 2px 0 #3a1a00;}
.beat-pulse{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:8;width:10px;height:10px;border-radius:50%;background:#3a1800;border:2px solid #6a3010;transition:background .05s,box-shadow .05s;}
.beat-pulse.on{background:#ffd060;box-shadow:0 0 8px rgba(255,208,60,.7);}

/* ── TAP VISUALS — pointer-events:none, PNG не двигаем ── */
.taps{position:absolute;inset:0;z-index:10;pointer-events:none;}
.tap{position:absolute;width:236px;height:236px;background:transparent;border:none;padding:0;border-radius:50%;overflow:hidden;pointer-events:none;}
.tap img{width:100%;height:100%;object-fit:contain;display:block;transition:filter .08s;}
.tap-tl{left:-58px;bottom:118px;}
.tap-bl{left:-58px;bottom:24px;}
.tap-tr{right:-58px;bottom:118px;}
.tap-br{right:-58px;bottom:24px;}
.tap.lit-0 img{filter:brightness(1.4) drop-shadow(0 0 8px rgba(255,70,70,.9));}
.tap.lit-1 img{filter:brightness(1.4) drop-shadow(0 0 8px rgba(70,160,255,.9));}
.tap.lit-2 img{filter:brightness(1.4) drop-shadow(0 0 8px rgba(70,210,90,.9));}
.tap.lit-3 img{filter:brightness(1.4) drop-shadow(0 0 8px rgba(255,195,40,.9));}

/* ── TAP HIT-ЗОНЫ — невидимые, в нижней части PNG, ниже pour/gather ──
   pour:   left, bottom:229–415px
   gather: right, bottom:248–408px
   Хитбоксы верхних тапов: bottom:118, height:100 → 118–218px (ниже pour/gather) ✓ */
.tap-hit{position:absolute;width:100px;height:100px;border-radius:50%;background:transparent;border:none;cursor:pointer;pointer-events:all;z-index:35;}
.tap-hit:active{transform:scale(.86);}
.tap-tl-hit{left:10px; bottom:118px;}
.tap-bl-hit{left:10px; bottom:24px;}
.tap-tr-hit{right:10px;bottom:118px;}
.tap-br-hit{right:10px;bottom:24px;}

/* ── ACTION BUTTONS — не трогаем ── */
.act-btn{position:absolute;width:160px;height:160px;background:transparent;border:none;cursor:pointer;pointer-events:all;z-index:30;padding:0;border-radius:50%;transition:opacity .2s,filter .2s;}
.act-btn:active{transform:scale(.86);}
.act-btn img{width:100%;height:100%;object-fit:contain;display:block;}
.act-btn:focus-visible{outline:2px solid #ffd060;outline-offset:2px;}
.act-pour  {left:-35px;bottom:229px;width:186px;height:186px;}
.act-gather{right:-18px;bottom:248px;}
.act-btn.cooldown{opacity:.4;}
.act-btn.needed img{filter:drop-shadow(0 0 10px rgba(255,170,64,.8));}

/* ── FLASH OVERLAYS ── */
.fok    {position:fixed;inset:0;background:#44cc22;opacity:.13;pointer-events:none;z-index:999;}
.ferr   {position:fixed;inset:0;background:#dd2200;opacity:.16;pointer-events:none;z-index:999;}
.fsplash{position:fixed;inset:0;background:#60aaff;opacity:.18;pointer-events:none;z-index:999;}

/* ── BOTTOM BAR ── */
.bottom-strip{height:82px;background:#130700;border-top:3px solid #0a0400;padding:14px 12px 12px;}
.pl-label{font-size:11px;color:#a07040;letter-spacing:1.2px;text-align:center;margin-bottom:7px;}
.pl-outer{border:3px solid #6b3a10;outline:2px solid #0a0300;border-radius:2px;overflow:hidden;width:390px;margin:0 auto;}
.pl-track{height:14px;position:relative;background:linear-gradient(90deg,#5a0000 0%,#aa2200 18%,#ee5500 36%,#ffaa00 54%,#ccdd00 72%,#33bb11 88%,#22aa00 100%);}
.pl-cover{position:absolute;top:0;right:0;height:100%;background:#0a0200;transition:width .25s;}
</style>
</head>
<body>
<h2 class="sr-only">Игра банщика</h2>

<div class="phone">
<div class="scene">

  <img id="layerNature" class="layer" src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2013_14_59.png" alt="">
  <img id="layerSauna"  class="layer" src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_25_29.png" alt="">
  <img id="layerStove"  class="layer" src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2013_36_35.png" alt="">
  <img id="layerMikael" class="layer" src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_40_03.png" alt="">
  <img id="layerBench"  class="layer" src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_20_07.png" alt="">
  <img id="layerGuest"  class="layer" src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_03_51.png" alt="">

  <div class="timer-disp"><span class="timer-val" id="timerVal">1:00</span></div>
  <div class="beat-pulse" id="beatPulse"></div>
  <div class="temp-disp">
    <span class="temp-val" id="tempVal">65°</span>
    <span class="temp-range">цель: 76–88°</span>
  </div>

  <button class="act-btn act-pour" id="btnPour" type="button" onclick="onPour()" aria-label="Поддать пар">
    <img src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2014_46_25.png" alt="">
  </button>
  <button class="act-btn act-gather" id="btnGather" type="button" onclick="onGather()" aria-label="Забрать пар">
    <img src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2014_55_38.png" alt="">
  </button>

  <!-- TAP VISUALS (только визуал, pointer-events:none) -->
  <div class="taps">
    <button class="tap tap-tl" id="tap0" type="button" aria-label="Тап 1">
      <img src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2014_31_37.png" alt="">
    </button>
    <button class="tap tap-bl" id="tap1" type="button" aria-label="Тап 2">
      <img src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2014_31_37.png" alt="">
    </button>
    <button class="tap tap-tr" id="tap2" type="button" aria-label="Тап 3">
      <img src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2014_31_37.png" alt="">
    </button>
    <button class="tap tap-br" id="tap3" type="button" aria-label="Тап 4">
      <img src="https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2014_31_37.png" alt="">
    </button>
  </div>

  <!-- TAP HIT-ЗОНЫ (невидимые, z:35, спущены вниз — не пересекаются с pour/gather) -->
  <button class="tap-hit tap-tl-hit" type="button" onclick="onTap(0,'l')" aria-label="Тап 1"></button>
  <button class="tap-hit tap-bl-hit" type="button" onclick="onTap(1,'l')" aria-label="Тап 2"></button>
  <button class="tap-hit tap-tr-hit" type="button" onclick="onTap(2,'r')" aria-label="Тап 3"></button>
  <button class="tap-hit tap-br-hit" type="button" onclick="onTap(3,'r')" aria-label="Тап 4"></button>

</div>

<div class="bottom-strip">
  <div class="pl-label">УДОВОЛЬСТВИЕ ГОСТЯ</div>
  <div class="pl-outer"><div class="pl-track"><div class="pl-cover" id="plCover" style="width:20%"></div></div></div>
</div>
</div>

<script>
var BASE = 'https://raw.githubusercontent.com/SolartStudio/drova-game-assets/main/';
var IMGS = {
  hitR:   BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_40_03.png',
  hitL:   BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_52_07.png',
  pour1:  BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2016_02_07.png',
  pour2:  BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_59_29.png',
  catch1: BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_56_19.png',
  catch2: BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_53_58.png'
};
var GUEST = {
  front: BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_03_51.png',
  flip:  BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_06_19.png',
  back:  BASE+'ChatGPT%20Image%2030%20%D0%BC%D0%B0%D1%8F%202026%20%D0%B3.%2C%2015_01_23.png'
};
var IDLE = IMGS.hitR;

// ── ПРЕДЗАГРУЗКА всех PNG Микаэля и гостя ───────────────────────────────────
(function(){
  [IMGS.hitR,IMGS.hitL,IMGS.pour1,IMGS.pour2,IMGS.catch1,IMGS.catch2,
   GUEST.front,GUEST.flip,GUEST.back].forEach(function(s){new Image().src=s;});
})();

// ── АНИМАЦИЯ МИКАЭЛЯ ─────────────────────────────────────────────────────────
var mikaelTimer=null;
function setMikael(src){document.getElementById('layerMikael').src=src;}

// CSS-вспышка: видна даже когда src не меняется (правый удар = idle)
function swingMikael(){
  var el=document.getElementById('layerMikael');
  el.classList.remove('swing');
  void el.offsetWidth; // reflow → перезапускает анимацию
  el.classList.add('swing');
  setTimeout(function(){el.classList.remove('swing');},420);
}

function animateMikael(frames,delay,done){
  if(mikaelTimer){clearTimeout(mikaelTimer);mikaelTimer=null;}
  var i=0;
  function step(){
    if(i>=frames.length){if(done)done();return;}
    setMikael(frames[i++]);
    mikaelTimer=setTimeout(step,delay);
  }
  step();
}
function mikaelHit(side){
  swingMikael();
  animateMikael([side==='l'?IMGS.hitL:IMGS.hitR],450,function(){setMikael(IDLE);});
}
function mikaelPour(){
  swingMikael();
  animateMikael([IMGS.pour1,IMGS.pour2,IMGS.pour1,IMGS.pour2],280,function(){setMikael(IDLE);});
}
function mikaelCatch(){
  swingMikael();
  animateMikael([IMGS.catch1,IMGS.catch2,IMGS.catch1,IMGS.catch2],280,function(){setMikael(IDLE);});
}

// ── ПЕРЕВОРОТ ГОСТЯ ──────────────────────────────────────────────────────────
var guestFlipped=false;
function flipGuest(){
  if(guestFlipped)return;
  guestFlipped=true;
  var g=document.getElementById('layerGuest');
  g.src=GUEST.flip;
  setTimeout(function(){g.src=GUEST.back;},450);
}

// ── ИГРОВОЕ СОСТОЯНИЕ ────────────────────────────────────────────────────────
var guest={tempMin:76,tempMax:88,bpm:88,pattern:[0,2,1,3,0,1,3,2]};
var pl=80,temp=65,sessionSec=60,patternIdx=0;
var activeTap=-1,tapLitAt=0,hitWindow=380;
var beatMs=Math.round(60000/guest.bpm);
var tapCls=['lit-0','lit-1','lit-2','lit-3'];
var pourCooldown=0,POUR_CD=7,steamTimer=10,STEAM_INTERVAL=10;
var steamNeeded=false,gameEnded=false,TOTAL_SEC=60;

function pad(n){return n<10?'0'+n:''+n;}
function setBar(){var c=document.getElementById('plCover');if(c)c.style.width=Math.round(100-pl)+'%';}
function setTemp(){
  var el=document.getElementById('tempVal');if(!el)return;
  el.textContent=Math.round(temp)+'°';el.className='temp-val';
  if(temp<guest.tempMin)el.classList.add('cold');
  else if(temp>guest.tempMax)el.classList.add('hot');
  else el.classList.add('ok');
}
function setTimer(){var el=document.getElementById('timerVal');if(!el)return;el.textContent=Math.floor(sessionSec/60)+':'+pad(sessionSec%60);}
function updatePourBtn(){var b=document.getElementById('btnPour');if(!b)return;b.classList.toggle('cooldown',pourCooldown>0);}
function updateGatherBtn(){var b=document.getElementById('btnGather');if(!b)return;b.classList.toggle('needed',steamNeeded);}
function pulseBeat(){var d=document.getElementById('beatPulse');if(d){d.classList.add('on');setTimeout(function(){d.classList.remove('on');},120);}}
function clearActiveTap(){
  if(activeTap>=0){var e=document.getElementById('tap'+activeTap);if(e)e.classList.remove(tapCls[0],tapCls[1],tapCls[2],tapCls[3]);}
  activeTap=-1;
}
function flash(ok,splash){var d=document.createElement('div');d.className=splash?'fsplash':ok?'fok':'ferr';document.body.appendChild(d);setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},120);}

function onPour(){
  if(gameEnded||pourCooldown>0)return;
  temp=Math.min(105,temp+10);pourCooldown=POUR_CD;
  mikaelPour();flash(true,true);setTemp();updatePourBtn();
}
function onGather(){
  if(gameEnded)return;
  steamNeeded=false;steamTimer=STEAM_INTERVAL;
  mikaelCatch();pl=Math.min(100,pl+3);setBar();updateGatherBtn();
}
function onBeat(){
  if(gameEnded)return;
  pulseBeat();
  if(activeTap>=0){clearActiveTap();pl=Math.max(0,pl-7);setBar();}
  var next=guest.pattern[patternIdx%guest.pattern.length];
  patternIdx++;activeTap=next;tapLitAt=Date.now();
  var el=document.getElementById('tap'+next);
  if(el)el.classList.add(tapCls[next]);
  var cap=next;
  setTimeout(function(){if(!gameEnded&&activeTap===cap){clearActiveTap();pl=Math.max(0,pl-7);setBar();}},hitWindow);
}
function onTap(idx,side){
  if(gameEnded)return;
  mikaelHit(side);
  if(idx===activeTap){
    var elapsed=Date.now()-tapLitAt;
    clearActiveTap();
    pl=Math.min(100,pl+(elapsed<180?7:4));
    temp=Math.min(105,temp+2.5);
    flash(true,false);setBar();setTemp();
  } else {
    pl=Math.max(0,pl-6);flash(false,false);setBar();
  }
}
function finishSession(){
  if(gameEnded)return;gameEnded=true;clearActiveTap();
  clearInterval(beatIv);clearInterval(sessIv);
  setTimeout(function(){alert('Сессия завершена!\nУдовольствие гостя: '+Math.round(pl)+'%');},80);
}
function sessionTick(){
  if(gameEnded||sessionSec<=0)return;
  sessionSec--;setTimer();temp=Math.max(30,temp-1.0);
  if(pourCooldown>0){pourCooldown--;updatePourBtn();}
  steamTimer--;if(steamTimer<=0){steamNeeded=true;steamTimer=STEAM_INTERVAL;updateGatherBtn();}
  var drain=0.2;
  if(temp<guest.tempMin)drain+=2.0;if(temp>guest.tempMax)drain+=2.5;if(steamNeeded)drain+=1.8;
  pl=Math.max(0,pl-drain);setBar();setTemp();
  if(!guestFlipped&&sessionSec<=Math.round(TOTAL_SEC*0.25))flipGuest();
  if(sessionSec<=0)finishSession();
}
var beatIv,sessIv;
setTimeout(function(){
  beatIv=setInterval(onBeat,beatMs);sessIv=setInterval(sessionTick,1000);
  setTemp();setTimer();setBar();updatePourBtn();updateGatherBtn();
},600);
</script>
</body>
</html>
